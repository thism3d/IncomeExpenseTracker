name: sisirbindu_tracker
description: SISIRBINDU TRACKERAPP — income & expense tracking with income-tax-ready reports.
publish_to: none

# NOTE: the Android versionName/versionCode are derived from
# lib/utils/constants.dart (appVersion / appBuildNumber) — that file is the source
# of truth, because the admin panel's auto-update check compares against it.
# Keep this roughly in sync for iOS/desktop tooling.
version: 1.0.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # state + storage
  provider: ^6.1.2
  shared_preferences: ^2.3.3
  flutter_secure_storage: ^9.2.2

  # transport
  web_socket_channel: ^3.0.1
  http: ^1.2.2
  dio: ^5.7.0

  # app lock — biometric (fingerprint / face) with a PIN fallback
  local_auth: ^2.3.0
  local_auth_android: ^1.0.46
  pin_code_fields: ^8.0.1

  # ui
  google_fonts: ^6.2.1
  fl_chart: ^0.69.0
  table_calendar: ^3.1.2
  flutter_svg: ^2.0.10+1
  shimmer: ^3.0.0
  intl: ^0.19.0
  video_player: ^2.9.2

  # attachments: camera, gallery, files, audio
  image_picker: ^1.1.2
  camera: ^0.11.0+2
  image: ^4.3.0
  file_picker: ^8.1.4
  record: ^5.2.1
  just_audio: ^0.9.42
  open_filex: ^4.5.0
  pdfrx: ^1.0.9
  path_provider: ^2.1.5
  share_plus: ^10.1.2
  permission_handler: ^11.3.1

  # notifications + updates
  flutter_local_notifications: ^18.0.1
  package_info_plus: ^8.1.1

dependency_overrides:
  # record's own resolution picks record_linux 0.7.x, which predates startStream
  # and the named `request` arg on hasPermission — so it no longer satisfies its
  # platform interface. Dart type-checks EVERY plugin in the tree, Linux ones
  # included, so that is a hard compile error even for an Android-only build.
  # record_linux 1.3.1 + interface 1.5.0 is the last coherent pair.
  record_linux: 1.3.1
  record_platform_interface: 1.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/video/

# Adaptive launcher icons generated from the logo.
#   dart run flutter_launcher_icons
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/logo.png"
  remove_alpha_ios: true
  web:
    generate: true
    image_path: "assets/images/logo.png"
    background_color: "#FFFFFF"
    theme_color: "#0E7C66"
  windows:
    generate: true
    image_path: "assets/images/logo.png"
  macos:
    generate: true
    image_path: "assets/images/logo.png"
